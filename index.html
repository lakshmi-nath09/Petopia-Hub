<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petopia Hub | Smart Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hub-container">
        <header class="no-print">
            <h1>Petopia Hub</h1>
            <p>Your Pet’s Digital Universe</p>
        </header>

        <div class="no-print">
            <div class="form-group">
                <label>Pet Name</label>
                <input type="text" id="petName" placeholder="e.g. Simba">
            </div>

            <div class="form-group">
                <label>Pet Breed/Type</label>
                <input type="text" id="petType" placeholder="e.g. Persian Cat">
            </div>

            <div class="form-group">
                <label>Last Vet Visit</label>
                <input type="date" id="vetDate">
            </div>

            <button class="btn-main" onclick="createHub()">Launch Hub</button>
        </div>

        <div id="passport">
            <div style="display: flex; justify-content: space-between;">
                <h2 id="resName" style="margin:0;">Name</h2>
                <span style="color: #00b894; font-weight: bold;">● Active</span>
            </div>
            <p id="resType" style="margin: 5px 0; color: #636e72;">Type</p>

            <div class="tip-box" id="dailyTip">
                <strong>Petopia Tip:</strong> Ready to care for your pet!
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <label>Today's Mood Log:</label>
            <div class="mood-selector no-print">
                <button class="mood-btn" onclick="logMood('Happy')">😊</button>
                <button class="mood-btn" onclick="logMood('Sleepy')">😴</button>
                <button class="mood-btn" onclick="logMood('Energetic')">⚡</button>
                <button class="mood-btn" onclick="logMood('Hungry')">🍖</button>
            </div>
            <p id="moodStatus" style="font-style: italic; font-size: 0.9rem; text-align: center; color: #6c5ce7;"></p>

            <button class="print-btn no-print" onclick="window.print()">Print Care Summary</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
